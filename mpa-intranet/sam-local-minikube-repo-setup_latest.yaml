# Solace Agent Mesh (SAM) - Minikube Local Development Configuration
# This configuration is optimized for local development on Minikube
#
# Features:
# - No TLS (uses HTTP)
# - No OIDC authentication (development mode)
# - ClusterIP service (access via port-forward or minikube service)
# - Bundled PostgreSQL + SeaweedFS persistence
# - Minimal resource requirements
#
# Usage:
# 1. Start Minikube: minikube start
# 2. Install: helm install agent-mesh charts/solace-agent-mesh -f samples/values/minikube-local-dev.yaml
# 3. Access: kubectl port-forward svc/agent-mesh-solace-agent-mesh 8000:80
# 4. Open: http://localhost:8000

# SAM Core Configuration
sam:
  # Use localhost for local development
  dnsName: "localhost"

  # Session secret (you can use any string for local dev)
  sessionSecretKey: "local-dev-secret-key-change-me"

  # Enterprise mode enabled but with OIDC disabled for local dev
  enterprise: true

  # # Disable authorization for local development (no RBAC)
  # authorization_service:
  # #enabled: false
  # enabled: true
  # type: "default_rbac"  # Grants access by default for local dev
  # # Explicitly map sam_dev_user to admin role
  # userRoleMappings:
  #   sam_dev_user: "sam_user"

  
  # Disable authentication for local development
  authorization:
    enabled: false

  # # OIDC disabled - leave issuer empty to skip authentication
  oauthProvider:
    oidc:
      issuer: "http://host.minikube.internal:8082/realms/sam"  # Empty issuer disables OIDC authentication
      clientId: "sam-client"
      clientSecret: "Sop9n7toUC6am2LlCdhUOhWjSivGBebw"  

   # User to role assignments for RBAC
  authenticationRbac:
    users:
      - identity: "sam_dev_user" # can be email, username, name, etc.
        roles: ["sam_admin"]
        description: "SAM Administrator Account"
      - identity: "user1@example.com"
        roles: ["sam_user"]
        description: "Standard SAM User"

     # Dynamic role assignment from IDP claims (alternative to static users)
    # When configured, SAM will extract roles from the specified OIDC claim
    idpClaims:
      enabled: false
      oidcProvider: "oidc"
      claimKey: "groups"      # e.g., "groups", "roles", "custom_claim"
      # Map IDP claim values to SAM roles
      mappings: {}
        # Example mappings:
        # "admin-group": ["sam_admin"]
        # "user-group": ["sam_user"]

    # Default roles assigned to users (applies to both static and IDP claims methods)
    # - For IDP claims: assigned when user's claims don't match any mappings
    # - For static assignments: assigned to authenticated users not explicitly listed in 'users'
    defaultRoles:
      - "sam_admin"    

  frontendServerUrl: "http://localhost:8009"
  platformServiceUrl: "http://localhost:8082"
  cors:
    allowedOriginRegex: "https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?"

# Solace Broker Configuration (Helm)
broker:
  #url: "ws://my-release-solace-pubsubplus.default.svc.cluster.local:8008"
  url: "ws://sam-broker-pubsubplus-dev.default.svc.cluster.local:8008"
  clientUsername: "default"
  password: "default"
  vpn: "default"


# Kubernetes Service Configuration
service:
  type: ClusterIP  # ClusterIP for local development
  #type: NodePort  # NodePort for direct access via minikube IP
  annotations: {}
  tls:
    enabled: false  # No TLS for local development
    passphrase: ""


# Persistence Configuration
# Uses bundled PostgreSQL and SeaweedFS for local development
global:
  persistence:
    enabled: true
    namespaceId: "solace-agent-mesh-local" # Unique namespace for local dev

agentDeployer:
  #chartBaseUrl: "/Users/sahaj_sharma/Documents/Workspace/minikube/sam-enterprise-ga/solace-agent-mesh/files/sam-agent-1.2.5.tgz"
  chartBaseUrl: "/Users/sahaj_sharma/Documents/Workspace/minikube/sam-enterprise-ga/solace-agent-mesh/files/sam-agent-1.2.4.tgz"
  localCharts:
    enabled: true
    mountpath: "/opt/helm-charts"

# SAM Deployment Configuration
samDeployment:
  # No image pull secret needed for local dev if images are public
  # or if you're using minikube's docker daemon
  imagePullSecret: ""

  # Main SAM Image
  image:
    repository: solace-agent-mesh-enterprise
    #tag: 1.143.1
    tag: 1.97.4
    pullPolicy: IfNotPresent  # Use IfNotPresent to avoid pulling on every restart

  # Agent Deployer image
  agentDeployer:
    image:
      repository: sam-agent-deployer
      #tag: 1.8.2
      tag: 1.7.0
      pullPolicy: IfNotPresent

environmentVariables:
  ENABLE_ADVANCED_AGENTS: "true"
  ALLOW_ADVANCED_AGENT_DOCKER_IMAGES: "true"
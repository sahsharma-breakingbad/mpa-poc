# =============================================================================
# Action Recommendation Agent - Deployer Mode
# =============================================================================
# Deploy with:
#   helm install action-recommendation-agent ./solace-agent-mesh-agent \
#     -f action-recommendation-agent-values.yaml \
#     --set-file config.yaml=Action_Recommendation_Agent.yaml

id: "action-recommendation-agent"

global:
  persistence:
    namespaceId: "solace-agent-mesh-local"

solaceBroker:
  url: "ws://sam-broker-pubsubplus-dev.default.svc.cluster.local:8008"
  username: "default"
  password: "default"
  vpn: "default"
  useTemporaryQueues: true

llmService:
  endpoint: "https://lite-llm.mymaas.net/"
  generalModelName: "openai/claude-opus-4-6"
  apiKey: "sk-xxxxxxxxxxxxxxxxx"

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: "agent_019d5e28_9723_74e3_ac3e_9f50e2f20890.log"

apps:
  - name: "agent_019d5e28_9723_74e3_ac3e_9f50e2f20890"
    app_base_path: "."
    app_module: "solace_agent_mesh.agent.sac.app"
    broker:
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}
    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "agent_019d5e28_9723_74e3_ac3e_9f50e2f20890"
      display_name: "Vessel Screening Agent"
      
      max_llm_calls: 3
      instruction: |
        You are a Vessel Screening Agent. Delegate vessel data retrieval to Vessel Intelligence Agent, then apply compliance rules and return a concise screening report.

        DEFINITIONS:
        - MLP = Marine License and Permit
        - PSC = Port State Control

        WORKFLOW (complete in ONE pass — exactly 1 sub-agent call, then respond immediately):
        1. Call Vessel Intelligence Agent ONCE with the IMO number to retrieve vessel data
        2. When the sub-agent returns the data, apply these detection rules IMMEDIATELY:
           - MLP detected if: ShipStatus>0 AND ShipFlagDisputed>0 AND ShipOwnerUNSanctionList>0 AND FlagName>0
           - MLP+PSC detected if MLP AND any of: ShipOFACSSIList>0, ShipUSTreasuryOFACAdvisoryList>0, ShipDarkActivityIndicator>0
           - DarkActivity>0 alone (no MLP): notify PSC only
           - MLP+PSC: notify both authorities; MLP only: notify MLP only
        3. Return immediately with: vessel summary, MLP/PSC flag status, violations, and recommended actions

        RULES:
        - Do NOT create charts, images, or artifacts — text/tables only
        - Do NOT make multiple sub-agent calls — one call to Vessel Intelligence Agent is sufficient
        - After receiving sub-agent data, respond IMMEDIATELY — do NOT make extra calls
        - Be concise — findings and actions only, no lengthy explanations
      model:
        model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
        api_base: "${LLM_SERVICE_ENDPOINT}"
        api_key: "${LLM_SERVICE_API_KEY}"
        timeout: 30
        stream_timeout: 30
      tools: []
      session_service:
        type: ${PERSISTENCE_TYPE, sql}
        database_url: ${DATABASE_URL, sqlite:///agent_019d5e28_9723_74e3_ac3e_9f50e2f20890.db}
        default_behavior: PERSISTENT
      artifact_service:
        type: ${ARTIFACT_SERVICE_TYPE, s3}
        bucket_name: ${S3_BUCKET_NAME}
        endpoint_url: ${S3_ENDPOINT_URL}
        aws_region: ${AWS_REGION, us-east-1}
        artifact_scope: namespace
      artifact_handling_mode: ignore
      enable_embed_resolution: false
      enable_artifact_content_instruction: false
      agent_card:
        description: "Screens vessels for MLP and PSC compliance by calling Vessel Intelligence Agent for data retrieval. Can run in PARALLEL with MPA Knowledge Agent as they are independent tasks. Returns screening results with flag status and violations."
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "evaluate_vessel_screening_status"
            name: "Evaluate Vessel Screening Status"
            description: "Retrieve vessel data and analyze it against MLP and PSC compliance criteria to determine regulatory flag status based on sanctions lists and risk indicators."
          - id: "generate_screening_reports"
            name: "Generate Screening Reports"
            description: "Create detailed screening reports showing flag status, risk factors, sanctions matches, and recommended actions for vessel operations."
          - id: "screen_against_sanctions_lists"
            name: "Screen Against Sanctions Lists"
            description: "Cross-reference vessel owners, operators, and vessels against OFAC, UN sanctions lists, and other regulatory databases to identify compliance violations."
          - id: "analyze_dark_activity_indicators"
            name: "Analyze Dark Activity Indicators"
            description: "Evaluate vessels for suspicious behaviors including flag disputes, dark activity patterns, and other indicators that trigger PSC compliance flags."
      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: ["agent_019d44b4_ea89_71c0_bc18_540aaee3e201"]
        request_timeout_seconds: 30
{{- if and .Values.caBundle.enabled .Values.caBundle.cert (not .Values.caBundle.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sam.fullname" . }}-ca-bundle
  labels:
    {{- include "sam.labels" . | nindent 4 }}
  {{- include "sam.annotations" . | nindent 2 }}
type: Opaque
data:
  ca.crt: {{ .Values.caBundle.cert | b64enc }}
{{- end }}
